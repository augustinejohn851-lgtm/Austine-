<!DOCTYPE html>
<html>
<head>
    <title>My Music App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
    <h1>🎵 My Music</h1>

    <img src="cover.jpg" class="cover">

    <h2 id="songName">My Song</h2>
    <p id="artist">Unknown Artist</p>

    <audio id="player" controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="buttons">
        <button onclick="previous()">⏮</button>
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
        <button onclick="next()">⏭</button>
    </div>

    <h3>Playlist</h3>

    <ul>
        <li onclick="changeSong('song1.mp3','Song One')">
            Song One
        </li>

        <li onclick="changeSong('song2.mp3','Song Two')">
            Song Two
        </li>
    </ul>

</div>


<script src="script.js"></script>

</body>
</html>
